{% extends 'base.html' %}
{% block title %}Login · Job Automation{% endblock %}

{% block content %}
<div class="card" style="max-width:420px; margin:2rem auto;">
    <h1>Log in</h1>
    {% if form.non_field_errors %}<ul class="errorlist">{{ form.non_field_errors }}</ul>{% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="width:100%; justify-content:center; margin-top:0.5rem;">Log in</button>
    </form>
    <p class="muted" style="margin-top:1rem;">Don't have an account? <a href="{% url 'register' %}">Register</a></p>
</div>
{% endblock %}
