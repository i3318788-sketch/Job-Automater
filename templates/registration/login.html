{% extends 'base.html' %}
{% block title %}Login · Job Automation{% endblock %}

{% block content %}
<div class="card">
    <h1>Log in</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log in</button>
    </form>
    <p style="margin-top:1rem;">Don't have an account? <a href="{% url 'register' %}">Register</a></p>
</div>
{% endblock %}
