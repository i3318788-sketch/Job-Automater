# Nginx reverse-proxy config for the Job Automation System.
# Copy to /etc/nginx/sites-available/job_automation and symlink into sites-enabled.
#
# Notes:
#  - Static files are served by WhiteNoise inside the app (through the proxy),
#    so no /static/ alias is needed.
#  - Media (uploaded CVs, tailored PDFs) IS served directly by nginx from the
#    host bind-mount created by docker-compose (./media -> /app/media), which on
#    the server lives at /opt/job_automation/media.

server {
    listen 80;
    server_name 51.79.55.83 jobautomation.yourdomain.com;

    # Allow reasonably large CV uploads (default nginx limit is 1M).
    client_max_body_size 25M;

    location = /favicon.ico { access_log off; log_not_found off; }

    # Uploaded files & generated PDFs (served straight from disk).
    location /media/ {
        alias /opt/job_automation/media/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
